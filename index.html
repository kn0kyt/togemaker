<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>togemaker — トゲトゲ背景プロトタイプ</title>
    <meta
      name="description"
      content="お気に入りの画像にトゲを生やそう！写真の背景をブラウザ内AIで切り抜いてトゲトゲ演出風の背景に合成する、非公式・非営利のファンメイドツール。画像は端末の外に送信されません。"
    />
    <!-- OGP / X (Twitter) Card -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="togemaker" />
    <meta property="og:title" content="togemaker — トゲトゲ背景メーカー" />
    <meta
      property="og:description"
      content="お気に入りの画像にトゲを生やそう！写真の背景をブラウザ内AIで切り抜いてトゲトゲ演出風の背景に合成。画像は端末の外に送信されません。"
    />
    <meta property="og:url" content="https://togemaker.pages.dev/" />
    <meta property="og:image" content="https://togemaker.pages.dev/ogp-v2.jpg" />
    <meta property="og:image:width" content="1600" />
    <meta property="og:image:height" content="900" />
    <meta property="og:image:alt" content="トゲトゲ背景に合成された猫の写真（togemaker の出力例）" />
    <meta property="og:locale" content="ja_JP" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- FOUC対策: CSS本体のロード前でも背景だけは即座に暗くする -->
    <style>
      html {
        background: #0b0808;
        color-scheme: dark;
      }
    </style>
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- crossorigin: COEP (require-corp) 環境でもフォント CSS を読み込めるようにする -->
    <link
      href="https://fonts.googleapis.com/css2?family=Reggae+One&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
      rel="stylesheet"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <h1 class="brand">toge<span>maker</span></h1>
        <p class="tagline">お気に入りの画像にトゲを生やそう！</p>
        <span class="proto-badge">PROTOTYPE v0.2 — 合成対応</span>
      </header>

      <main class="stage-wrap">
        <canvas id="stage" width="1600" height="900"></canvas>
        <div id="loading" class="loading" hidden>
          <div class="spinner"></div>
          <span id="loading-text">処理中…</span>
        </div>
      </main>

      <footer class="controls">
        <div class="control photo-block">
          <input id="file" type="file" accept="image/*" hidden />
          <button id="photo" class="btn btn-red">📷 画像を選ぶ</button>
          <span id="ai-status" class="ai-status"></span>
        </div>
        <div class="control gauge-block">
          <label for="gauge">怒りゲージ</label>
          <input id="gauge" type="range" min="0" max="100" value="70" />
          <span class="gauge-readout"><span id="gauge-value">70</span></span>
        </div>
        <div class="control aspects" id="aspects">
          <button data-aspect="16:9" class="is-active">16:9</button>
          <button data-aspect="1:1">1:1</button>
          <button data-aspect="9:16">9:16</button>
          <button data-aspect="3:1">3:1</button>
        </div>
        <div class="control actions">
          <button id="regen" class="btn">🎲 再生成</button>
          <button id="save" class="btn">⬇ PNG保存</button>
        </div>
        <span class="seed">SEED <span id="seed">—</span></span>
      </footer>

      <p class="disclaimer">
        <span class="privacy">🔒 すべての処理はお使いの端末内で完結します。画像がサーバーに送信されることはありません。</span><br />
        非公式・非営利のファンメイドツールの試作です。アニメ本編の画像素材は使用していません。
      </p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
