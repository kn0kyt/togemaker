<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>背景除去 検証ページ（dev only）</title>
    <style>
      body {
        background: #0b0808;
        color: #f2e9e4;
        font-family: sans-serif;
        padding: 24px;
      }
      h1 {
        font-size: 1.1rem;
        margin-bottom: 4px;
      }
      .note {
        color: #8a7770;
        font-size: 0.8rem;
        margin-bottom: 16px;
      }
      #drop {
        border: 2px dashed #2b1815;
        padding: 20px;
        text-align: center;
        margin-bottom: 16px;
      }
      #status {
        font-weight: bold;
        color: #ff2617;
        margin-bottom: 12px;
        min-height: 1.2em;
      }
      .compare {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
      }
      .compare figure {
        flex: 1 1 320px;
        min-width: 0;
      }
      .compare figcaption {
        font-size: 0.8rem;
        color: #8a7770;
        margin-bottom: 6px;
      }
      .compare img {
        max-width: 100%;
        /* 透過確認用の市松模様 */
        background: repeating-conic-gradient(#3a3a3a 0% 25%, #262626 0% 50%) 0 0 / 24px 24px;
        border: 1px solid #2b1815;
      }
      #log {
        margin-top: 16px;
        font-size: 0.75rem;
        color: #8a7770;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>背景除去 検証ページ</h1>
    <p class="note">
      自前実装 (onnxruntime-web + ISNet) の動作検証用（開発時のみ・ビルドには含まれない）。?auto
      を付けると /test.local.png で自動実行。
    </p>
    <div id="drop">
      画像をドラッグ＆ドロップ、または
      <input id="file" type="file" accept="image/*" />
    </div>
    <p id="status">待機中</p>
    <div class="compare">
      <figure>
        <figcaption>元画像</figcaption>
        <img id="orig" alt="" />
      </figure>
      <figure>
        <figcaption>背景除去後（市松模様 = 透過）</figcaption>
        <img id="result" alt="" />
      </figure>
    </div>
    <pre id="log"></pre>
    <script type="module" src="/src/cutout.ts"></script>
  </body>
</html>
